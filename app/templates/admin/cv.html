{% extends "base.html" %}

{% block title %}CV verwalten{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
    <h2 class="fw-bold mb-0">CV verwalten</h2>
  </div>

  <div class="card border-0 shadow-sm p-4" style="max-width: 500px;">

    {% if cv_exists %}
    <div class="d-flex align-items-center gap-2 mb-4">
      <i class="fas fa-file-pdf text-danger fa-lg"></i>
      <span class="fw-semibold">cv.pdf</span>
      <span class="badge bg-success ms-1">Aktiv</span>
      <a href="{{ url_for('static', filename='cv/cv.pdf') }}"
         target="_blank" class="btn btn-sm btn-outline-secondary ms-auto">
        Ansehen
      </a>
    </div>
    {% else %}
    <div class="text-muted mb-4">
      <i class="fas fa-file-pdf fa-lg me-2"></i>Noch kein CV hochgeladen.
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label fw-semibold">
          {{ 'CV ersetzen' if cv_exists else 'CV hochladen' }}
        </label>
        <input type="file" name="cv" accept=".pdf" class="form-control" required>
        <div class="form-text">Nur PDF, max. 2MB. Ersetzt die vorherige Datei.</div>
      </div>
      <button type="submit" class="btn btn-primary px-4">Hochladen</button>
    </form>

  </div>
</div>
{% endblock %}
